name: Bot Pairs Trading Diario

# Cuándo debe ejecutarse este bot
on:
  schedule:
    # Corre de Lunes (1) a Viernes (5) a las 20:15 UTC (17:15 Hora Argentina)
    - cron: '15 20 * * 1-5'
  
  # Permite ejecutarlo a mano desde la pestaña Actions con el botón "Run workflow"
  workflow_dispatch:

# ESTO ES CLAVE: Le da permisos al servidor virtual para sobreescribir archivos en tu repositorio
permissions:
  contents: write

jobs:
  analisis_cuantitativo:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Instalar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías financieras
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar el Algoritmo y Enviar Alerta
      # Inyectamos tus secretos de manera segura
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python bot_produccion.py

    - name: Guardar la memoria contable (JSON) en GitHub
      run: |
        git config --global user.name "Bot Cuantitativo"
        git config --global user.email "bot@quant.com"
        git add cartera.json
        # La siguiente línea verifica si el archivo JSON realmente se modificó hoy. 
        # Si el bot no operó, no hace nada. Si operó o pagó comisión, lo guarda y lo sube.
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualiza saldo de cartera" && git push)
